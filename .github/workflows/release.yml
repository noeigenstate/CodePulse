name: Build and Release CodePulse

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version without the v prefix. Defaults to package.json.'
        required: false
        type: string

permissions:
  contents: write

jobs:
  windows:
    name: Build Windows installer
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify
        run: |
          pnpm typecheck
          pnpm test
          pnpm smoke
          pnpm lint

      - name: Clean release output
        shell: pwsh
        run: Remove-Item -Path 'apps/desktop/release' -Recurse -Force -ErrorAction SilentlyContinue

      - name: Build installer
        run: pnpm dist

      - name: Resolve release version
        id: release
        shell: pwsh
        run: |
          $packageVersion = (Get-Content package.json -Raw | ConvertFrom-Json).version
          $inputVersion = '${{ inputs.version }}'

          if ($env:GITHUB_REF_TYPE -eq 'tag') {
            $tag = $env:GITHUB_REF_NAME
          } elseif ($inputVersion.Trim().Length -gt 0) {
            $tag = "v$($inputVersion.TrimStart('v'))"
          } else {
            $tag = "v$packageVersion"
          }

          "package_version=$packageVersion" >> $env:GITHUB_OUTPUT
          "tag=$tag" >> $env:GITHUB_OUTPUT
          "release_name=CodePulse $tag" >> $env:GITHUB_OUTPUT

      - name: Write release notes
        id: notes
        shell: pwsh
        run: |
          $tag = '${{ steps.release.outputs.tag }}'
          $installerNames = Get-ChildItem -Path 'apps/desktop/release' -Filter '*.exe' -File |
            Sort-Object Name |
            ForEach-Object { "- Windows x64: ``$($_.Name)``" }

          if ($installerNames.Count -eq 0) {
            throw "No Windows installer found for release notes."
          }

          $downloadLines = $installerNames -join "`n"
          $notesPath = Join-Path $env:RUNNER_TEMP 'codepulse-release-notes.md'
          @(
            "## $tag",
            "",
            "### 功能说明",
            "",
            "- 实时展示 Claude Code / Codex 当前任务状态、项目状态和最近完成提醒。",
            "- 显示上下文窗口、5 小时额度、每周额度和额度刷新时间。",
            "- 启动时自动检查本机 Claude / Codex CLI、CodePulse hooks 配置和 Codex hook 信任提示。",
            "- 支持中英文界面切换、托盘常驻和桌面通知。",
            "",
            "### 修复问题",
            "",
            "- 修复 Windows 上 Claude Code ``.cmd`` shim 损坏时误报“未检测到命令行工具”的问题。",
            "",
            "### 下载地址",
            "",
            "#### Windows",
            "",
            $downloadLines,
            "",
            "下载下方 Assets 中的 ``.exe`` 安装包后直接运行安装。",
            "",
            "### 使用提示",
            "",
            "- 首次运行后，如果弹出“配置与权限检查”，请按提示在 Codex 中输入 ``/hooks`` 并信任 CodePulse hook。",
            "- Claude Code / Codex 至少需要运行一轮任务，CodePulse 才能收到实时状态。"
          ) | Set-Content -Path $notesPath -Encoding utf8

          "path=$notesPath" >> $env:GITHUB_OUTPUT

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: codepulse-windows-${{ steps.release.outputs.tag }}
          if-no-files-found: error
          path: |
            apps/desktop/release/*.exe
            apps/desktop/release/*.blockmap
            apps/desktop/release/latest.yml

      - name: Create or update GitHub release
        if: github.ref_type == 'tag' || github.event_name == 'workflow_dispatch'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          RELEASE_NAME: ${{ steps.release.outputs.release_name }}
          RELEASE_NOTES: ${{ steps.notes.outputs.path }}
        run: |
          $releaseDir = 'apps/desktop/release'
          $assets = @(
            Get-ChildItem -Path $releaseDir -Filter '*.exe' -File
            Get-ChildItem -Path $releaseDir -Filter '*.blockmap' -File
            Get-ChildItem -Path $releaseDir -Filter 'latest.yml' -File -ErrorAction SilentlyContinue
          )

          if ($assets.Count -eq 0) {
            throw "No release assets found in $releaseDir."
          }

          $assetPaths = $assets | ForEach-Object { $_.FullName }
          gh release view $env:RELEASE_TAG --repo $env:GITHUB_REPOSITORY *> $null

          if ($LASTEXITCODE -eq 0) {
            gh release edit $env:RELEASE_TAG `
              --repo $env:GITHUB_REPOSITORY `
              --title $env:RELEASE_NAME `
              --notes-file $env:RELEASE_NOTES `
              --latest
            gh release upload $env:RELEASE_TAG $assetPaths --repo $env:GITHUB_REPOSITORY --clobber
          } else {
            gh release create $env:RELEASE_TAG $assetPaths `
              --repo $env:GITHUB_REPOSITORY `
              --title $env:RELEASE_NAME `
              --notes-file $env:RELEASE_NOTES `
              --latest
          }
