appId: dev.codepulse.desktop
productName: CodePulse
electronVersion: 33.3.1
electronDist: ../../node_modules/electron/dist
compression: maximum
electronLanguages:
  - en-US
  - zh-CN
directories:
  output: release
  buildResources: build
# After pack: drop ffmpeg / swiftshader (dashboard has no media / soft-Vulkan need).
afterPack: scripts/after-pack.cjs
files:
  # Only app runtime outputs (never root-level preview screenshots under out/).
  - out/main/**
  - out/preload/**
  - out/renderer/**
  - build/icon.png
  - package.json
  # Keep installers lean — only native sqlite should remain under node_modules.
  - '!**/*.map'
  - '!**/*.d.ts'
  - '!**/*.md'
  - '!**/*.ts'
  - '!**/README*'
  - '!**/CHANGELOG*'
  - '!**/LICENSE*'
  - '!**/license*'
  - '!**/tsconfig*.json'
  - '!**/.github/**'
  - '!**/test/**'
  - '!**/tests/**'
  - '!**/docs/**'
  - '!**/example/**'
  - '!**/examples/**'
  - '!**/benchmark/**'
  - '!**/benchmarks/**'
  - '!**/*.markdown'
  - '!**/node_modules/better-sqlite3/deps/**'
  - '!**/node_modules/better-sqlite3/src/**'
  - '!**/node_modules/better-sqlite3/build/Release/obj/**'
  - '!**/node_modules/better-sqlite3/build/Release/*.lib'
  - '!**/node_modules/better-sqlite3/build/Release/*.exp'
  - '!**/node_modules/better-sqlite3/build/Release/*.iobj'
  - '!**/node_modules/better-sqlite3/build/Release/*.ipdb'
  - '!**/node_modules/better-sqlite3/build/Release/*.pdb'
  # NOTE: Do NOT exclude `bindings` / `file-uri-to-path` — better-sqlite3 loads
  # the native addon via `require('bindings')('better_sqlite3.node')`. Stripping
  # them leaves the installer's SQLite dead (live UI works, analytics empty).
  - '!**/node_modules/**/{prebuild-install,node-abi,napi-build-utils,tar-fs,tar-stream,rc,tunnel-agent,expand-template,github-from-package,simple-get,simple-concat,pump,bl,fs-constants,inherits,string_decoder,util-deprecate,buffer,base64-js,ieee754,minimist,deep-extend,ini,strip-json-comments,mkdirp-classic,chownr,detect-libc}/**'
extraResources:
  - from: ../../packages/hooks
    to: codepulse-hooks
    filter:
      - bin/**
      - lib/**
      - package.json
# Native addon must stay unpacked from the asar archive so it can be dlopen'd.
asarUnpack:
  - '**/*.node'
  - '**/node_modules/better-sqlite3/**'
win:
  icon: build/icon.png
  artifactName: CodePulse_${version}_${arch}-setup.${ext}
  target:
    - nsis
mac:
  icon: build/icon.png
  # Separate installers per CPU (NOT universal):
  #   CodePulse_<version>_mac-arm64.dmg  → Apple Silicon
  #   CodePulse_<version>_mac-x64.dmg    → Intel
  artifactName: CodePulse_${version}_mac-${arch}.${ext}
  category: public.app-category.developer-tools
  hardenedRuntime: false
  gatekeeperAssess: false
  # Force per-arch packages; do not merge into a single universal binary.
  target:
    - target: dmg
      arch:
        - arm64
        - x64
linux:
  icon: build/icon.png
  target:
    - AppImage
  category: Development
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  include: build/installer.nsh
dmg:
  artifactName: CodePulse_${version}_mac-${arch}.${ext}
