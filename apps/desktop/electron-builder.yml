appId: dev.codepulse.desktop
productName: CodePulse
electronVersion: 33.3.1
electronDist: ../../node_modules/electron/dist
directories:
  output: release
  buildResources: build
files:
  - out/**
  - build/icon.png
  - package.json
extraResources:
  - from: ../../packages/hooks
    to: codepulse-hooks
    filter:
      - bin/**
      - lib/**
      - package.json
# Native addon must stay unpacked from the asar archive so it can be dlopen'd.
asarUnpack:
  - '**/*.node'
  - '**/better-sqlite3/**'
win:
  icon: build/icon.png
  artifactName: CodePulse_${version}_${arch}-setup.${ext}
  target:
    - nsis
mac:
  icon: build/icon.png
  target:
    - dmg
  category: public.app-category.developer-tools
linux:
  icon: build/icon.png
  target:
    - AppImage
  category: Development
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  include: build/installer.nsh
