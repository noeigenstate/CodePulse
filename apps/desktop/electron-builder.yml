appId: dev.codepulse.desktop
productName: CodePulse
electronVersion: 33.3.1
electronDist: ../../node_modules/electron/dist
compression: maximum
electronLanguages:
  - en-US
  - zh-CN
directories:
  output: release
  buildResources: build
files:
  - out/**
  - build/icon.png
  - package.json
  - '!**/*.map'
  - '!**/*.d.ts'
  - '!**/node_modules/better-sqlite3/deps/**'
  - '!**/node_modules/better-sqlite3/src/**'
  - '!**/node_modules/better-sqlite3/build/Release/obj/**'
extraResources:
  - from: ../../packages/hooks
    to: codepulse-hooks
    filter:
      - bin/**
      - lib/**
      - package.json
# Native addon must stay unpacked from the asar archive so it can be dlopen'd.
asarUnpack:
  - '**/*.node'
win:
  icon: build/icon.png
  artifactName: CodePulse_${version}_${arch}-setup.${ext}
  target:
    - nsis
mac:
  icon: build/icon.png
  # Separate installers per CPU (NOT universal):
  #   CodePulse_<version>_mac-arm64.dmg  → Apple Silicon
  #   CodePulse_<version>_mac-x64.dmg    → Intel
  artifactName: CodePulse_${version}_mac-${arch}.${ext}
  category: public.app-category.developer-tools
  hardenedRuntime: false
  gatekeeperAssess: false
  # Force per-arch packages; do not merge into a single universal binary.
  target:
    - target: dmg
      arch:
        - arm64
        - x64
linux:
  icon: build/icon.png
  target:
    - AppImage
  category: Development
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  include: build/installer.nsh
dmg:
  artifactName: CodePulse_${version}_mac-${arch}.${ext}


